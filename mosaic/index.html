<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mosaic — Habit Tracker</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         max-width: 620px; margin: 0 auto; padding: 64px 22px 80px; line-height: 1.6; color: #1c1c1e; background: #fbf6ee; text-align: center; }
  @media (prefers-color-scheme: dark){ body{ color:#e8e8ea; background:#0b0e14; } a.btn{ background:#161b24; } }
  h1 { font-size: 34px; margin: 8px 0 6px; }
  p.tag { color: #8a8a8e; margin-top: 0; }
  .logo { font-size: 52px; }
  .links { margin-top: 34px; display: flex; flex-direction: column; gap: 12px; }
  a.btn { display: block; padding: 14px 18px; border-radius: 16px; text-decoration: none;
          background: #fff; color: inherit; font-weight: 700; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  a.btn:hover { transform: translateY(-1px); }
  footer { margin-top: 40px; color: #8a8a8e; font-size: 13px; }
  a { color: #2f6bed; }
</style>
</head>
<body>
  <div class="logo">🧩</div>
  <h1>Mosaic</h1>
  <p class="tag">A private, local-first habit tracker.</p>
  <div class="links">
    <a class="btn" href="/mosaic/privacy">Privacy Policy</a>
    <a class="btn" href="/mosaic/terms">Terms of Use</a>
    <a class="btn" href="/mosaic/support">Support</a>
  </div>
  <footer>Questions? <a href="mailto:support@buffedai.com">support@buffedai.com</a></footer>
</body>
</html>
